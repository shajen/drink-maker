[platformio]
env_default = esp8266

[env:esp8266]
lib_compat_mode = strict
platform = espressif8266
framework = arduino
board = nodemcuv2
board_build.f_cpu = 160000000L
board_build.filesystem = littlefs
upload_speed = 921600
monitor_speed = 74880
monitor_filters = esp8266_exception_decoder
build_flags =
    !echo "-D BUILD_TIME='\"$(date --rfc-3339=seconds)\"'"
    !echo "-D GIT_TAG='\"$(git describe --tags --always)\"'"
    !echo "-D GIT_COMMIT='\"$(git log -1 --format=%%h)\"'"
    ; -DDEBUG
    ; -DDEBUG_ESPUI
; upload_protocol = espota
; upload_port = vodka.local
; upload_flags = --auth=12345678
lib_deps =
    adafruit/Adafruit_VL53L0X
    adafruit/Adafruit SSD1306
    adafruit/Adafruit NeoPixel
    ESPUI
    ESP Async WebServer
    ESPAsyncTCP
